# @package _global_

# to execute this experiment run:
# python train.py experiment=graph_classification

defaults:
  - override /data: lightning_dataset
  - override /data/dataset: mutag
  - override /model: graph_classification
  - override /model/components@model.encoder: gcn

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["enzyme", "graph_classification", "gcn"]

seed: 12345

trainer:
  min_epochs: 50
  max_epochs: 350

data:
  batch_size: 32

logger:
  wandb:
    tags: ${tags}
    group: "enzyme"

# Assert data config values are compatible with the model
# Implementing these assertions in the config file allows Hydra to check them
# and stop the program from running if the configs are known to be incompatible
_assert_:
  - ${raise:AssertionError,gt,${hparams.data.num_graphs},1}
  - ${raise:AssertionError,is_not,${hparams.data.num_node_features},none}
  - ${raise:AssertionError,is_not,${hparams.data.num_classes},none}
