# @package _global_

# to execute this experiment run:
# python train.py experiment=graph_classification

defaults:
  - override /data: split_lightning_dataset
  - override /data/dataset: mutag
  - override /model: graph_classifier
  - override /model/components@model.encoder: gcn

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags:
  - ${hydra:runtime.choices.data/dataset} # automatically tag with the chosen dataset
  - ${hydra:runtime.choices.model} # automatically tag with the chosen model/task

seed: 12345

trainer:
  min_epochs: 50
  max_epochs: 350

data:
  batch_size: 32

logger:
  wandb:
    tags: ${tags}
    group: ${tags.0} # by default, group runs by the first tag (dataset)

# Assert data config values are compatible with the model
# Implementing these assertions in the config file allows Hydra to check them
# and stop the program from running if the configs are known to be incompatible
_assert_:
  data_more_than_one_graph: ${assert:${op:gt,${oc.select:hparams.data.num_graphs,0},1}}
  data_at_least_one_num_node_features: ${assert:${op:ge,${oc.select:hparams.data.num_node_features,0},1}}
  # Unless the task is binary, the number of classes must be specified and at least 1
  data_at_least_one_num_classes: ${assert:$${op:or_,${op:eq,${hparams.data.task},binary},${op:ge,${oc.select:hparams.data.num_classes,0},1}}}
