# @package _global_

# to execute this experiment run:
# python train.py experiment=graph_level_prediction

defaults:
  - override /data: split_lightning_dataset
  - override /data/dataset: mutag
  - override /model: graph_level
  # Metrics are part of the model, used to evaluate it during training, but they depend on the data task.
  # Intuitively, the metrics config should be interpolated based on the data config. However, limitations in the
  # interpolation capabilities of Hydra make this impractical.
  # In this context, the least bad solution is to assign the metrics manually at the experiment (or main config) level.
  - override /model/metrics: binary_classification

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags:
  - ${model.encoder._target_} # automatically tag with the chosen model architecture
  - ${hydra:runtime.choices.experiment} # automatically tag with the chosen experiment
  - ${hydra:runtime.choices.model} # automatically tag with the chosen model/task
  - ${hydra:runtime.choices.data/dataset} # automatically tag with the chosen dataset

seed: 12345

trainer:
  min_epochs: 50
  max_epochs: 350

callbacks:
  # Override default callbacks monitoring loss to monitor the 1st metric specified in the model metrics config
  model_checkpoint:
    # Interpolate the name of the metric to monitor from the model metrics config
    monitor: val/${op:getitem,${oc.dict.keys:model.metrics.metrics},0}
    # Inspect the monitored metric's torchmetric instance to determine whether to maximize or minimize it
    mode: ${cfg.metric_optim_mode:${op:getitem,${oc.dict.values:model.metrics.metrics},0}}

  early_stopping:
    # Interpolate the name of the metric to monitor from the model metrics config
    monitor: val/${op:getitem,${oc.dict.keys:model.metrics.metrics},0}
    patience: 50 # increase patience since the dataset is small
    # Inspect the monitored metric's torchmetric instance to determine whether to maximize or minimize it
    mode: ${cfg.metric_optim_mode:${op:getitem,${oc.dict.values:model.metrics.metrics},0}}

data:
  batch_size: 32

logger:
  wandb:
    tags: ${tags}
    group: ${tags.0} # by default, group runs by the first tag

# Assert data config values are compatible with the model
# Implementing these assertions in the config file allows Hydra to check them
# and stop the program from running if the configs are known to be incompatible
_assert_:
  data_more_than_one_graph: ${assert:${op:gt,${oc.select:hparams.data.num_graphs,0},1}}
  data_at_least_one_num_node_features: ${assert:${op:ge,${oc.select:hparams.data.num_node_features,0},1}}
