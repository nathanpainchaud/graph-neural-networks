# @package _global_

defaults:
  - /data/dataset/pyg_base@data.dataset: tu_dataset
  # To add a transform (or pre-transform) to the dataset, you can use the following syntax:
#  - /data/transform@data.dataset: <transform_name>

hparams:
  # hparams.data.* values are meant to expose the constant properties of the `torch_geometric.data.Dataset` instance
  # to make them available during the resolution of the configuration, using the same names.
  # This is done to allow for automatic interpolation of data-processing components (e.g. stratified splits)
  # and model architecture components (e.g. input/output dimensions) during the resolution of the configuration.
  # Therefore, it is important to provide the values available for your dataset, whether it is a PyTorch Geometric
  # dataset or your own custom dataset.
  data:
    # ENZYMES dataset contains 595 graphs in the cleaned version, and 600 graphs in the original version
    num_graphs: ${op.ternary:${data.dataset.cleaned}, 595, 600}
    num_node_labels: 3
    num_node_attributes: 18
    num_node_features: ${op:add,${.num_node_labels},${op.ternary:${data.dataset.use_node_attr}, ${.num_node_attributes}, 0}}
    num_classes: 6
