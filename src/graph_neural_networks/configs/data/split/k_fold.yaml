# @package data

split:
  _target_: graph_neural_networks.data.k_fold
  _partial_: True
  stratify_bins: ${op.ternary:${op:eq,${hparams.data.task},regression}, 5, null} # default to 5 if task is regression, otherwise None
  n_splits: ${op.ternary:${.holdout_test_size}, 5, 10} # default to 5 if `holdout_test_size`, otherwise 10
  test_fold: True
  holdout_test_size: ${op.ternary:${.test_fold}, null, 0.2} # default to 0.2 if `test_fold is False`, otherwise None
  shuffle: True
  random_state: 12345 # Use a different seed from the main seed to allow models w/ different seeds to use the same splits

has_val: True
has_test: ${op:or_,${.split.test_fold},${op:truth,${.split.holdout_test_size}}} # If `test_fold` or `holdout_test_size` are truthy, then we have a test set
