[project]
name = "graph-neural-networks"
version = "0.1.0"
description = "Experiments with Graph Neural Networks (GNNs)."
readme = "README.md"
repository = "https://github.com/nathanpainchaud/graph-neural-networks"
authors = [
    {name = "Nathan Painchaud", email = "nathan.painchaud@insa-lyon.fr"},
]
requires-python = ">=3.12,<4"
dependencies = [
    "filelock>=3.16.1,<4",
    "hydra-colorlog>=1.2.0,<2",
    "hydra-core>=1.3.2,<2",
    "hydra-joblib-launcher>=1.2.0,<2",
    "hydra-optuna-sweeper>=1.2.0,<2",
    "lightning>=2.4.0,<3",
    "rich>=13.9.4,<14",
    "rootutils>=1.0.7,<2",
    "scikit-learn>=1.5.2,<2",
    # Use our fork of torch-geometric that patches Lightning imports until the following issue gets solved and released:
    # https://github.com/pyg-team/pytorch_geometric/issues/9811
    # NOTE: The direct reference is specified here using hatchling's syntax (instead of in `tool.uv.sources`)
    # so that our fork also gets chosen when installing the package using `pip install .`
    "torch-geometric @ git+https://github.com/nathanpainchaud/pytorch_geometric.git@0bea004a831b2fde32b12cdaa03e3715cb44c240",
    "torchmetrics>=1.6.0,<2",
]
[project.optional-dependencies]
wandb = [
    "wandb>=0.19.1,<0.20",
]
ogb = [
    "ogb>=1.3.6,<2",
]
# torch libraries are not included in the main dependencies because they can be platform-specific
# rather, we leave them as optional dependencies (even though they are required for the code to run)
# and leave it up to the user to indicate which version they want to install
# This solution is inspired by one of the recommended ways to install pytorch listed in uv's documentation:
# https://docs.astral.sh/uv/guides/integration/pytorch/#configuring-accelerators-with-optional-dependencies
# Each extra corresponds to a different platform, so it is up to project maintainers to decide which platforms
# they want to list here, i.e. support
cpu = [
  "torch>=2.5.1,<3",
]
cu118 = [
  "torch>=2.5.1,<3",
]
cu121 = [
  "torch>=2.5.1,<3",
]
cu124 = [
  "torch>=2.5.1,<3",
]

[dependency-groups]
dev = [
    "pre-commit>=4.0.1,<5",
    {include-group = "lint"},
]
lint = [
    "docformatter>=1.7.5,<2",
    "ruff>=0.9,<0.10",
]

[project.scripts]
gnn-train = "graph_neural_networks.train:main"
gnn-eval = "graph_neural_networks.eval:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true  # Allow direct references to install `torch-geometric` from our fork

[tool.uv]
required-version = ">=0.5.14,<0.6"
# Refer to the note above about installing pytorch using optional dependencies,
# especially the link to uv's documentation, to understand this configuration
conflicts = [
  [
    { extra = "cpu" },
    { extra = "cu118" },
    { extra = "cu121" },
    { extra = "cu124" },
  ],
]

[tool.uv.sources]
# Refer to the note above about installing pytorch using optional dependencies,
# especially the link to uv's documentation, to understand this configuration
torch = [
  { index = "pytorch-cpu", extra = "cpu", marker = "sys_platform != 'Darwin'" },
  { index = "pytorch-cu118", extra = "cu118" },
  { index = "pytorch-cu121", extra = "cu121" },
  { index = "pytorch-cu124", extra = "cu124" },
]

[[tool.uv.index]]
# Refer to the note above about installing pytorch using optional dependencies,
# especially the link to uv's documentation, to understand this configuration
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu118"
url = "https://download.pytorch.org/whl/cu118"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    "W",
    # Pyflakes
    "F",
    # pydocstyle
    "D",
    # pyupgrade
    "UP",
    # flake8-bandit
    "S",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # pep8-naming
    "N",
    # Pylint (except Refactor (R))
    "PLC",
    "PLE",
    "PLW",
]
ignore = [
    # Allow use of assert
    "S101",
    # Do not require docstrings in __init__ and modules
    "D100",
    "D104",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.docformatter]
recursive = true
wrap-summaries=120
wrap-descriptions=120
