[project]
name = "graph-neural-networks"
version = "0.1.0"
description = "Experiments with Graph Neural Networks (GNNs)."
readme = "README.md"
repository = "https://github.com/nathanpainchaud/graph-neural-networks"
authors = [
    {name = "Nathan Painchaud", email = "nathan.painchaud@insa-lyon.fr"},
]
requires-python = ">=3.12,<4"
dependencies = [
    "hydra-colorlog>=1.2.0,<2",
    "hydra-core>=1.3.2,<2",
    "hydra-optuna-sweeper>=1.2.0,<2",
    "lightning>=2.4.0,<3",
    "rich>=13.9.4,<14",
    "rootutils>=1.0.7,<2",
    "torch-geometric>=2.6.1,<3",
    "torch>=2.5.1,<3",
    "torchmetrics>=1.6.0,<2",
]
[project.optional-dependencies]
wandb = [
    "wandb>=0.18.7,<0.19",
]

[dependency-groups]
dev = [
    "pre-commit>=4.0.1,<5",
]
lint = [
    "docformatter>=1.7.5,<2",
    "ruff>=0.8.0,<0.9",
]

[project.scripts]
gnn-train = "graph_neural_networks.train:main"
gnn-eval = "graph_neural_networks.eval:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
default-groups = [ "dev", "lint" ]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    "W",
    # Pyflakes
    "F",
    # pydocstyle
    "D",
    # pyupgrade
    "UP",
    # flake8-bandit
    "S",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # pep8-naming
    "N",
    # Pylint (except Refactor (R))
    "PLC",
    "PLE",
    "PLW",
]
ignore = [
    # Allow use of assert
    "S101",
    # Do not require docstrings in __init__ and modules
    "D100",
    "D104",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.docformatter]
recursive = true
wrap-summaries=120
wrap-descriptions=120
